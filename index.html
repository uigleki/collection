<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Perfect Collection</title>
        <meta
            name="description"
            content="Works that enrich rather than diminish - created from love, not manipulation."
        />
        <meta property="og:title" content="Perfect Collection" />
        <meta
            property="og:description"
            content="Works that enrich rather than diminish - created from love, not manipulation."
        />
        <meta property="og:type" content="website" />
        <meta property="og:image" content="https://spotless.pages.dev/og.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta name="twitter:card" content="summary_large_image" />

        <meta name="color-scheme" content="dark light" />
        <meta
            name="theme-color"
            content="#f2ece0"
            media="(prefers-color-scheme: light)"
        />
        <meta
            name="theme-color"
            content="#0b0e17"
            media="(prefers-color-scheme: dark)"
        />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="manifest" href="/manifest.webmanifest" />

        <script>
            // Theme before paint — deterministic, never a flash.
            try {
                var t = localStorage.getItem("theme");
                document.documentElement.dataset.theme =
                    t === "light" || t === "dark"
                        ? t
                        : matchMedia("(prefers-color-scheme: light)").matches
                          ? "light"
                          : "dark";
            } catch (e) {}
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/app/main.tsx"></script>
    </body>
</html>
